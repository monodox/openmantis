[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openmantis"
version = "0.1.1"
description = "OpenMantis is a local-model orchestration layer for caching, routing, and prompt budgeting."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
platform = [
    "psutil>=5.9",
]
dev = [
    "pytest>=8.0",
]

[project.scripts]
openmantis = "openmantis.cli:main"

[project.urls]
Homepage = "https://github.com/monodox/openmantis"
Repository = "https://github.com/monodox/openmantis"
Issues = "https://github.com/monodox/openmantis/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
